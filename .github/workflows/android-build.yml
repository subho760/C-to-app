name: Build and Sign Android App (APK & AAB)

# Removed the "push" trigger so it NEVER runs automatically anymore
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-android

    - name: Decode Keystore File
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > src/release.jks

    - name: Build Android AAB (Release)
      run: |
        dotnet publish src/App.csproj -c Release -f net9.0-android /p:AndroidPackageFormat=aab \
        /p:AndroidKeyStore=true \
        /p:AndroidSigningKeyStore=release.jks \
        /p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD }}" \
        /p:AndroidSigningKeyAlias="${{ secrets.KEY_ALIAS }}" \
        /p:AndroidSigningKeyPass="${{ secrets.KEY_PASSWORD }}"

    - name: Build Android APK (Release)
      run: |
        dotnet publish src/App.csproj -c Release -f net9.0-android /p:AndroidPackageFormat=apk \
        /p:AndroidKeyStore=true \
        /p:AndroidSigningKeyStore=release.jks \
        /p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD }}" \
        /p:AndroidSigningKeyAlias="${{ secrets.KEY_ALIAS }}" \
        /p:AndroidSigningKeyPass="${{ secrets.KEY_PASSWORD }}"

    - name: Upload Play Store Bundle (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: NightShadow-release-aab
        path: |
          src/bin/Release/net9.0-android/*-Signed.aab

    - name: Upload Testing Package (APK)
      uses: actions/upload-artifact@v4
      with:
        name: NightShadow-testing-apk
        path: |
          src/bin/Release/net9.0-android/*-Signed.apk
          
